<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>The Backrooms - AlenaGutsol</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        #start { position: fixed; top:0; left:0; width:100%; height:100%; display:flex; justify-content:center; align-items:center; color:#ffcc99; font-size:3em; cursor:pointer; z-index:100; }
        #ui { position: fixed; bottom:20px; left:20px; color:white; font-family:monospace; display:none; }
    </style>
</head>
<body>
    <div id="start">KLICKE ZUM STARTEN</div>
    <div id="ui">HEALTH: 100% | STAMINA: 100%</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/PointerLockControls.js"></script>
    <script>
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xcccc99); // Gelbliche Atmosphäre

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const controls = new THREE.PointerLockControls(camera, document.body);
        document.getElementById('start').onclick = () => controls.lock();

        controls.addEventListener('lock', () => {
            document.getElementById('start').style.display = 'none';
            document.getElementById('ui').style.display = 'block';
        });

        // Wände erzeugen (Optimiert durch Instanced-ähnliche Logik)
        const wallMat = new THREE.MeshBasicMaterial({ color: 0xe6d48c });
        for (let i = 0; i < 20; i++) {
            const wall = new THREE.Mesh(new THREE.BoxGeometry(20, 20, 2), wallMat);
            wall.position.set((Math.random()-0.5)*200, 10, (Math.random()-0.5)*200);
            wall.rotation.y = Math.random() * Math.PI;
            scene.add(wall);
        }

        // Boden
        const floor = new THREE.Mesh(new THREE.PlaneGeometry(500, 500), new THREE.MeshBasicMaterial({ color: 0x8c784e }));
        floor.rotation.x = -Math.PI/2;
        scene.add(floor);

        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
