<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Backrooms - AlenaGutsol</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: sans-serif; }
        #start-screen { position: absolute; top:0; left:0; width:100%; height:100%; background:#000; color:#fff; display:flex; flex-direction: column; justify-content:center; align-items:center; cursor:pointer; z-index:100; }
        #ui-layer { position: absolute; bottom: 20px; left: 20px; display: none; color: white; }
    </style>
</head>
<body>

    <div id="start-screen">
        <h1>THE BACKROOMS</h1>
        <p>Klicke zum Starten</p>
    </div>

    <div id="ui-layer">
        <div>HEALTH: [||||----]</div>
        <div>STAMINA: [|||-----]</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/PointerLockControls.js"></script>

    <script>
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a1a);
        scene.fog = new THREE.Fog(0x1a1a1a, 10, 100);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const controls = new THREE.PointerLockControls(camera, document.body);
        document.getElementById('start-screen').addEventListener('click', () => controls.lock());

        controls.addEventListener('lock', () => {
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('ui-layer').style.display = 'block';
        });

        controls.addEventListener('unlock', () => {
            document.getElementById('start-screen').style.display = 'flex';
            document.getElementById('ui-layer').style.display = 'none';
        });

        // Optimierte Welt-Generierung
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);

        function createWall(x, z, w, d) {
            const geom = new THREE.BoxGeometry(w, 20, d);
            const mat = new THREE.MeshLambertMaterial({ color: 0xcfb53b });
            const wall = new THREE.Mesh(geom, mat);
            wall.position.set(x, 10, z);
            scene.add(wall);
        }

        // Einfaches Layout, um CPU-Last zu vermeiden
        createWall(0, -50, 100, 5);
        createWall(0, 50, 100, 5);
        createWall(-50, 0, 5, 100);
        createWall(50, 0, 5, 100);

        const floorGeom = new THREE.PlaneGeometry(100, 100);
        const floorMat = new THREE.MeshLambertMaterial({ color: 0x998855 });
        const floor = new THREE.Mesh(floorGeom, floorMat);
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);

        // Steuerung
        const keys = {};
        document.addEventListener('keydown', (e) => keys[e.code] = true);
        document.addEventListener('keyup', (e) => keys[e.code] = false);

        function animate() {
            requestAnimationFrame(animate);
            if (controls.isLocked) {
                const speed = 0.5;
                if (keys['KeyW']) controls.moveForward(speed);
                if (keys['KeyS']) controls.moveForward(-speed);
                if (keys['KeyA']) controls.moveRight(-speed);
                if (keys['KeyD']) controls.moveRight(speed);
            }
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
