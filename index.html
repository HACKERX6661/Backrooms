<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>The Backrooms - Fix</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; }
        #start-screen { position: absolute; top:0; left:0; width:100%; height:100%; background:#000; color:#fff; display:flex; justify-content:center; align-items:center; cursor:pointer; z-index:100; font-size:2em; }
        #ui-layer { display: none; }
    </style>
</head>
<body>
    <div id="start-screen"><h1>KLICKE ZUM STARTEN</h1></div>
    <div id="ui-layer"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/PointerLockControls.js"></script>
    <script>
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a1a);
        scene.fog = new THREE.Fog(0x1a1a1a, 100, 1000);

        // Dark ambient light for eerie atmosphere
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.3);
        scene.add(ambientLight);

        // Add a dim directional light for some depth
        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.2);
        directionalLight.position.set(50, 50, 50);
        scene.add(directionalLight);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.y = 1.6; // Eye level
        const renderer = new THREE.WebGLRenderer({ antialias: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        const controls = new THREE.PointerLockControls(camera, document.body);
        
        // Create Backrooms level
        const geometry = new THREE.BoxGeometry(200, 200, 200);
        const material = new THREE.MeshLambertMaterial({ color: 0xffcc99 }); // Yellowish walls
        const room = new THREE.Mesh(geometry, material);
        room.position.set(0, 0, 0);
        scene.add(room);

        // Create some corridors/variations
        for (let i = 0; i < 5; i++) {
            const wallGeom = new THREE.BoxGeometry(50, 3, 200);
            const wallMat = new THREE.MeshLambertMaterial({ color: 0xffcc99 });
            const wall = new THREE.Mesh(wallGeom, wallMat);
            wall.position.set(i * 60 - 120, 100, 0);
            wall.castShadow = true;
            wall.receiveShadow = true;
            scene.add(wall);
        }

        // Movement controls
        const velocity = new THREE.Vector3();
        const keys = {};
        const speed = 0.1;

        document.addEventListener('keydown', (e) => { keys[e.key.toLowerCase()] = true; });
        document.addEventListener('keyup', (e) => { keys[e.key.toLowerCase()] = false; });

        document.getElementById('start-screen').addEventListener('click', () => {
            controls.lock();
            document.getElementById('start-screen').style.display = 'none';
        });

        controls.addEventListener('lock', () => {
            document.getElementById('ui-layer').style.display = 'block';
        });

        controls.addEventListener('unlock', () => {
            document.getElementById('ui-layer').style.display = 'none';
            document.getElementById('start-screen').style.display = 'flex';
        });

        function animate() {
            requestAnimationFrame(animate);

            // Handle movement
            velocity.x = 0;
            velocity.z = 0;

            if (keys['w']) {
                velocity.z -= speed;
            }
            if (keys['s']) {
                velocity.z += speed;
            }
            if (keys['a']) {
                velocity.x -= speed;
            }
            if (keys['d']) {
                velocity.x += speed;
            }

            // Apply velocity in camera's direction
            const direction = new THREE.Vector3();
            camera.getWorldDirection(direction);
            direction.y = 0;
            direction.normalize();

            const right = new THREE.Vector3();
            right.crossVectors(camera.up, direction);
            right.normalize();

            if (velocity.z !== 0) {
                camera.position.addScaledVector(direction, velocity.z);
            }
            if (velocity.x !== 0) {
                camera.position.addScaledVector(right, velocity.x);
            }

            renderer.render(scene, camera);
        }

        // Handle window resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
