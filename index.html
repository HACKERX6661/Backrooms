<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>The Backrooms - Fix</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; }
        #start-screen { position: absolute; top:0; left:0; width:100%; height:100%; background:#000; color:#fff; display:flex; justify-content:center; align-items:center; cursor:pointer; z-index:100; }
        #ui-layer { display: none; }
    </style>
</head>
<body>
    <div id="start-screen"><h1>KLICKE ZUM STARTEN</h1></div>
    <div id="ui-layer"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/PointerLockControls.js"></script>
    <script>
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050505);

        // STABILITÄTS-FIX: Kein PointLight mehr in der Schleife. 
        // Wir nutzen nur noch ein einziges, performantes AmbientLight.
        const light = new THREE.AmbientLight(0xffffff, 0.8); 
        scene.add(light);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const controls = new THREE.PointerLockControls(camera, document.body);
        document.getElementById('start-screen').addEventListener('click', () => controls.lock());

        // Dein restlicher Code (Map-Logik etc.) hier einfügen...
        
        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
